<html><head>
    <meta charset="UTF-8">
    <title>The Bazement</title>
    
    <style>
        body {
            background-color: #00BB00;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            text-align: center;
            background-color: #008800;
            padding: 5px;
            font-size: large;
        }
        a {
            color: #7FFFD4;
        }
        .content-box {
            background-color: #00AA00;
            padding: 15px;
            margin: 10px auto;
            width: 400px; /* Narrower width */
            border: 1px solid #000000;
        }
        #flash-crop {
            width: 350px;
            height: 262px; /* 350 * 3/4 = 262.5, 4:3 ratio */
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }
        #flash-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>
    <div class="content-box">
        <h1>Welcome to The Bazement</h1>
        
        <p>This site revolves around my <strong>stickfigure</strong> animations and <em>comics</em> sometimes.</p>
        <p>Here you can see my terrible 2000s styled animations.</p>

        <div style="text-align: center; margin-top: 20px;">
            <p><a href="https://thebazement.newgrounds.com">Newgrounds</a></p>
            <p><a href="https://alensbase.miraheze.org/wiki/Special:AllPages">The Official Wiki</a></p>
            <p><a href="/comics">Comics</a></p>
            <p><a href="/toons">Toons</a></p>
            <p><a href="/contact">Contact</a></p>
        </div>
    </div>

    <div class="content-box">
        <h1>My Latest Animation</h1>
        <div style="text-align: center;">
            <div id="flash-crop">
                <div id="flash-container"></div>
            </div>
        </div>
    </div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("DOMContentLoaded", () => {
            let ruffle = window.RufflePlayer.newest();
            let player = ruffle.createPlayer();
            player.style.width = "100%";
            player.style.height = "100%";
            let container = document.getElementById("flash-container");
            container.appendChild(player);
            player.load("https://raw.githubusercontent.com/acethecreatoe-png/alendzi/main/145693_BENDEESTICK_7.swf");
        });
    </script>
</body></html>
